name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily self-check at 02:00 UTC.
    - cron: "0 2 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/test?schema=public
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        name: "Install dependencies"
      - run: pnpm audit --audit-level=high
        name: "Audit dependencies (advisory)"
        continue-on-error: true
      - run: pnpm --filter @betterme/api exec prisma migrate deploy
        name: "Apply DB migrations"
      - run: pnpm --filter @betterme/api exec prisma generate
        name: "Generate Prisma client"
      - run: pnpm lint
        name: "Lint"
      - run: pnpm typecheck
        name: "Typecheck"
      - run: pnpm --filter @betterme/api build
        name: "Build API"
      - run: pnpm test
        name: "Run tests"
      - run: pnpm --filter @betterme/shared test --coverage
        name: "Core algorithm coverage gate"
